plugins {
    id 'java'
    id 'application'
}

description = 'multiple page capture to TIFF example'

application {
    mainClass = "org.icepdf.examples.capture.MultipleCapture"
    applicationDefaultJvmArgs = ["-Xms64m", "-Xmx1024m"]
}

repositories {
    mavenCentral()
    maven { url = "https://repository.jboss.org/nexus/content/repositories/thirdparty-releases/" }
}

dependencies {
    implementation project(':core:core-awt'), project(':viewer:viewer-awt')
    implementation 'javax.media:jai-core:1.1.3'
}