plugins {
    id 'java'
    id 'application'
}

dependencies {
    implementation project(':core:core-awt'), project(':viewer:viewer-awt')
}

description = 'watermark page capture example'

application {
    mainClass = "org.icepdf.examples.capture.WatermarkPageCapture"
    applicationDefaultJvmArgs = ["-Xms64m", "-Xmx1024m"]
}
