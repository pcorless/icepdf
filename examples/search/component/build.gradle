plugins {
    id 'java'
    id 'application'
}

dependencies {
    implementation project(':core:core-awt'), project(':viewer:viewer-awt')
}

description = 'search highlight example'

application {
    mainClass = "org.icepdf.examples.search.SearchController"
    applicationDefaultJvmArgs = ["-Xms64m", "-Xmx1024m"]
}
