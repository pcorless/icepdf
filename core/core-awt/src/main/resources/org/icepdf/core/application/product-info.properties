# Product and build identification, filtered at build time by both Maven
# (resource filtering) and Gradle (processResources ReplaceTokens).  The
# @token@ placeholders are replaced with the current project values; if this
# file is ever used unfiltered, ProductInfo falls back to sensible defaults.
company=@company@
product=@product@
version=@project.version@
releaseType=@releaseType@
build=@build@
revision=@revision@